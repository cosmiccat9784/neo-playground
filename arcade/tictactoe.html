<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe - Neo Games Arcade</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-row">
          <a class="brand" href="../arcade.html">
            <img class="brand-logo" src="../assets/logo.png" alt="Neo Games logo" />
            <div>
              <p class="brand-name">Neo Games</p>
              <p class="brand-sub">Arcade</p>
            </div>
          </a>
          <div class="account-bar">
            <img class="account-avatar" src="../assets/logo.png" alt="Account avatar" />
            <div class="account-meta">
              <p class="account-name" data-neo-account-name>Not signed in</p>
              <a class="account-link" data-neo-account-action data-neo-login-href="../login.html">Log in</a>
            </div>
          </div>
        </div>
        <nav class="nav">
          <a href="../index.html">Discover</a>
          <a href="../new.html">New</a>
          <a href="../multiplayer.html">Multiplayer</a>
          <a href="../arcade.html">Arcade</a>
        </nav>
      </header>

      <div class="layout">
        <main class="main">
          <section class="player">
            <div class="player-header">
              <div>
                <h2>Tic Tac Toe</h2>
                <p>Classic / Two Players / Mouse</p>
              </div>
            </div>

            <div class="ttt-grid" id="ttt-grid">
              <button class="ttt-cell" data-index="0" type="button"></button>
              <button class="ttt-cell" data-index="1" type="button"></button>
              <button class="ttt-cell" data-index="2" type="button"></button>
              <button class="ttt-cell" data-index="3" type="button"></button>
              <button class="ttt-cell" data-index="4" type="button"></button>
              <button class="ttt-cell" data-index="5" type="button"></button>
              <button class="ttt-cell" data-index="6" type="button"></button>
              <button class="ttt-cell" data-index="7" type="button"></button>
              <button class="ttt-cell" data-index="8" type="button"></button>
            </div>

            <div class="player-status">
              <span>Status</span>
              <strong id="state">Ready</strong>
              <span class="status-hint">X goes first.</span>
              <button id="reset-btn" type="button">Reset</button>
            </div>
          </section>
        </main>
      </div>

      <footer class="footer">
        <p>Neo Games Lab - Built for fast browser play.</p>
        <div class="links">
          <a href="../index.html">About</a>
          <a href="../new.html">Developers</a>
          <a href="../multiplayer.html">Support</a>
        </div>
      </footer>
    </div>

    <script src="../data/auth.js"></script>
    <script src="tictactoe.js"></script>
  </body>
</html>
