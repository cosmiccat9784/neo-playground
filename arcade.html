<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade - Neo Games</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand" href="arcade.html">
          <img class="brand-logo" src="assets/logo.png" alt="Neo Games logo" />
          <div>
            <p class="brand-name">Neo Games</p>
            <p class="brand-sub">Arcade</p>
          </div>
        </a>
        <nav class="nav">
          <a href="index.html">Discover</a>
          <a href="new.html">New</a>
          <a href="multiplayer.html">Multiplayer</a>
          <a href="arcade.html">Arcade</a>
        </nav>
      </header>

      <div class="layout">
        <main class="main">
          <section class="grid" id="arcade">
            <div class="section-title">
              <h2>Classic Arcade</h2>
              <a href="index.html#top-rated">Top Rated</a>
            </div>
            <div class="cards">
              <article class="card">
                <div class="thumb one"></div>
                <div class="card-meta">
                  <h3>Pong</h3>
                  <span class="badge">Classic</span>
                </div>
                <p>The original paddle showdown. First to 11 wins.</p>
                <a class="card-link" href="arcade/pong.html">Play Pong</a>
              </article>
            </div>
          </section>
        </main>
      </div>

      <footer class="footer">
        <p>Neo Games Lab - Built for fast browser play.</p>
        <div class="links">
          <a href="index.html">About</a>
          <a href="new.html">Developers</a>
          <a href="multiplayer.html">Support</a>
        </div>
      </footer>
    </div>
  </body>
</html>
